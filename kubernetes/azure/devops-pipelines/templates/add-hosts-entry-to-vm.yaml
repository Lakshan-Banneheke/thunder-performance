steps:
  - template: set-aks-credentials.yaml
  - template: get-bastion-node-ip.yaml
  - task: DownloadSecureFile@1
    name: vmKey
    displayName: 'Download VM Key'
    inputs:
      secureFile: 'azureVMSSHKey'

  - task: AzureCLI@2
    displayName: 'Add Thunder Ingress IP to Hosts File of VM'
    inputs:
      azureSubscription: '$(AZURE_SERVICE_CONNECTION_NAME)'
      scriptType: 'bash'
      scriptLocation: 'inlineScript'
      inlineScript: |
        # Get the IP of the thunder-perf-ingress
        INGRESS_IP=$(kubectl get ingress $(THUNDER_KUBERNETES_INGRESS) -o jsonpath='{.status.loadBalancer.ingress[0].ip}')
        
        # Check if the ingress IP is empty and fail the task if it is
        if [ -z "$INGRESS_IP" ]; then
          echo "##vso[task.logissue type=error]The ingress IP for $(THUNDER_KUBERNETES_INGRESS) is empty. Please ensure the ingress is properly configured and has an assigned IP address."
          echo "##vso[task.complete result=Failed;]"
          exit 1
        fi
        
        # Set the IP as pipeline variable
        echo "##vso[task.setvariable variable=THUNDER_INGRESS_IP]$INGRESS_IP"
        echo "Thunder ingress IP: $INGRESS_IP"
        
        echo "SSH into the VM and update /etc/hosts file"
        BASTION_NODE_IP=$(BASTION_NODE_IP)
        sudo chmod 400 $(vmKey.secureFilePath)
        ssh -o StrictHostKeyChecking=no -i $(vmKey.secureFilePath) azureuser@$BASTION_NODE_IP "echo '$INGRESS_IP thunder.local' | sudo tee -a /etc/hosts"
