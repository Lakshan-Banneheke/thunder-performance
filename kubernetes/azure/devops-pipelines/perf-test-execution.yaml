trigger: none

pr: none

pool:
  vmImage: 'ubuntu-latest'

parameters:
  - name: PERFORMANCE_IS_REPO
    displayName: Performance IS repo name
    type: string
    default: Lakshan-Banneheke/performance-is
  - name: PERFORMANCE_IS_THUNDER_BRANCH
    displayName: Performance IS repo branch name
    type: string
    default: thunder-new
  - name: CONCURRENCY
    displayName: Concurrency
    type: string
    default: 50-50
    values:
      - 50-50
      - 50-500
      - 50-1000
      - 50-3000
      - 500-3000
      - 1000-3000
  - name: BUILD_PURPOSE
    displayName: Perf-Test purpose
    type: string
    default: Regular Thunder performance test
  - name: RUN_MODE
    displayName: Run Mode
    type: string
    default: QUICK
    values:
      - QUICK
      - FULL
  - name: POPULATE_TEST_DATA
    displayName: Populate test data
    type: string
    default: false
  - name: python_version
    displayName: Python Version
    default: 3.9
    values:
      - 3.9

variables:
  - group: vg-thunder-perf
  - name: PERFORMANCE_IS_REPO
    value: ${{parameters.PERFORMANCE_IS_REPO}}
  - name: PERFORMANCE_IS_THUNDER_BRANCH
    value: ${{parameters.PERFORMANCE_IS_THUNDER_BRANCH}}

resources:
  repositories:
    - repository: performance-is
      type: github
      endpoint: thunder-performance
      name: $(PERFORMANCE_IS_REPO)
      ref: $(PERFORMANCE_IS_THUNDER_BRANCH)

jobs:
  - job: thunder_performance_test
    displayName: Asgardeo performance test
    # Change the timeout as required when running tests with data population
    timeoutInMinutes: 1200
    cancelTimeoutInMinutes: 1
    workspace:
      clean: all
    steps:
      - checkout: self

      - checkout: performance-is
        persistCredentials: true

      - task: UsePythonVersion@0
        inputs:
          versionSpec:  '${{ parameters.python_version }}'
        displayName: 'Use Python ${{ parameters.python_version }}'

      - task: DownloadSecureFile@1
        name: vmKey
        displayName: 'Download VM Key'
        inputs:
          secureFile: 'azureVMSSHKey'

      - script: |
          echo "Copying the VM Key to ~/.ssh and setting permissions"
          mkdir ~/.ssh
          sudo mv $(vmKey.secureFilePath) ~/.ssh/azure_id_rsa
          sudo chmod 400 ~/.ssh/azure_id_rsa
        displayName: 'Setup VM SSH Key'

      - template: ./utils/get-bastion-node-ip.yaml

      - task: AzureCLI@2
        displayName: Initiate performance test run
        inputs:
          azureSubscription: $(AZURE_SERVICE_CONNECTION_NAME)
          scriptType: bash
          useGlobalConfig: true
          scriptLocation: scriptPath
          scriptPath: '$(Agent.BuildDirectory)/s/performance-is/azure-pipeline/init_perf_run.sh'
          addSpnToEnvironment: true
        env:
          BUILD_NUM: $(Build.BuildNumber)
          BUILD_PURPOSE: ${{parameters.BUILD_PURPOSE}}
          BRANCH: ${{parameters.PERFORMANCE_IS_THUNDER_BRANCH}}
          GITHUB_USER_EMAIL: $(gitEmail)
          GITHUB_USERNAME: $(gitUsername)
          BUILD_TYPE: $(Build.Reason)
          BUILD_PATH: $(Build.ArtifactStagingDirectory)
          DATABASE_HOST_NAME: 'postgresql-thunder-perf-eastus2-001.postgres.database.azure.com' # TODO check if we can remove this
          THUNDER_HOST_NAME: 'thunder.local'
          POPULATE_TEST_DATA: ${{parameters.POPULATE_TEST_DATA}}
          RUN_MODE: ${{parameters.RUN_MODE}}
          CONCURRENCY: ${{parameters.CONCURRENCY}}
          BASTION_NODE_IP: $(BASTION_NODE_IP)

      - task: PublishPipelineArtifact@1
        displayName: Publish pipeline artifacts
        condition: always()
        inputs:
          targetPath: $(Build.ArtifactStagingDirectory)
          artifactType: 'pipeline'
          artifactName: 'PerformanceTestResults'

      - task: DownloadPipelineArtifact@2
        displayName: Download pipeline artifacts
        condition: succeeded()
        inputs:
          source: 'current'
          artifact: PerformanceTestResults
          path: '$(Pipeline.Workspace)/PerformanceTestResults'
