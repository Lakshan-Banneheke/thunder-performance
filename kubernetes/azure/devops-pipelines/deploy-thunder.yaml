trigger: none

parameters:
  - name: INSTALL_INTERNAL_NGINX_INGRESS
    displayName: Install Internal NGINX Ingress
    type: boolean
    default: true

pool:
  vmImage: 'ubuntu-latest'

variables:
  AZURE_SERVICE_CONNECTION: 'thunder-perf-workload-identity'
  INTERNAL_NGINX_CONTROLLER_LB_INTERNAL_IP: "10.0.2.5"
  INTERNAL_NGINX_CONTROLLER_LB_INTERNAL_SUBNET: "10.0.2.0/24"

jobs:
  - job: internal_nginx_ingress
    displayName: Internal Nginx Ingress Setup
    condition: eq(${{ parameters.INSTALL_INTERNAL_NGINX_INGRESS }}, True)
    steps:
      - template: './utils/install-nginx.yaml'
        parameters:
          KUBERNETES_SERVICE_CONNECTION: $(AZURE_SERVICE_CONNECTION)
          LB_INTERNAL_IP: $(INTERNAL_NGINX_CONTROLLER_LB_INTERNAL_IP)
          LB_INTERNAL_SUBNET: $(INTERNAL_NGINX_CONTROLLER_LB_INTERNAL_SUBNET)
